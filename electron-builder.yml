appId: com.yesplaymusic.app
productName: YesPlayMusic
directories:
  app: dist_electron/bundled
  output: dist_electron
files:
  - "**/*"
asar: true
asarUnpack:
  - server/**/*
  - "**/rust-napi-win32-x64-msvc/**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icons/icon.ico
nsis:
  deleteAppDataOnUninstall: false
  artifactName: YesPlayMusic-${version}-win-setup.exe
portable:
  artifactName: YesPlayMusic-${version}-win-portable.zip
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
