appId: com.aimusicplayer.app
productName: ai-musicplayer
directories:
  app: dist_electron/bundled
  output: dist_electron
files:
  - "**/*"
asar: false
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
portable:
  artifactName: ai-musicplayer-${version}.exe
nsis:
  artifactName: ai-musicplayer Setup ${version}.exe
  oneClick: false
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
afterPack: ./scripts/afterPackNoAsar.js
