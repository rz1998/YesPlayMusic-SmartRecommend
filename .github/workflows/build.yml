name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: none
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Electron (Windows)
        run: npm run electron:build-win
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Package artifact
        shell: bash
        run: |
          cd dist_electron
          # Find built artifacts
          ls -lh
          # Create portable zip if not already created by electron-builder
          if [ ! -f "ai-musicplayer-${{ github.ref_name }}-win-portable.zip" ]; then
            powershell -Command "Compress-Archive -Path 'win-unpacked\*' -DestinationPath 'ai-musicplayer-${{ github.ref_name }}-win-portable.zip' -Force"
          fi
          ls -lh *.zip *.exe 2>/dev/null || true

      - name: Upload to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to find existing release, if not create one
          gh release view ${{ github.ref_name }} --repo ${{ github.repository }} || \
            gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
          # Upload all artifacts
          cd dist_electron
          for f in *.exe *.zip; do
            if [ -f "$f" ]; then
              echo "Uploading $f..."
              gh release upload ${{ github.ref_name }} "$f" --repo ${{ github.repository }}
            fi
          done
