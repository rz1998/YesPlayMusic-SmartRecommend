name: Release

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Update version from git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node -e "const pkg=require('./package.json'); pkg.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          echo "Updated version to $VERSION"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Build Electron app
        run: npx vue-cli-service electron:build
        env:
          VUE_APP_NETEASE_API_URL: /api
          VUE_APP_ELECTRON_API_URL: /api
          VUE_APP_ELECTRON_API_URL_DEV: http://127.0.0.1:10754
          VUE_APP_LASTFM_API_KEY: 09c55292403d961aa517ff7f5e8a3d9c
          VUE_APP_LASTFM_API_SHARED_SECRET: 307c9fda32b3904e53654baff215cb67
          GH_TOKEN: ${{ secrets.github_token }}

      - uses: actions/upload-artifact@v4
        with:
          name: YesPlayMusic-mac
          path: dist_electron/*-universal.dmg
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: YesPlayMusic-win
          path: dist_electron/*Setup*.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: YesPlayMusic-linux
          path: dist_electron/*.AppImage
          if-no-files-found: ignore

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        run: |
          gh release delete ${{ github.ref_name }} --repo ${{ github.repository }} --yes || true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # 先创建release
          gh release create ${{ github.ref_name }} \
            --title 'YesPlayMusic ${{ github.ref_name }}' \
            --notes 'Automatic release from GitHub Actions' \
            --repo ${{ github.repository }}
          # 上传所有安装包文件
          find . -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) 2>/dev/null | \
          while IFS= read -r file; do
            gh release upload ${{ github.ref_name }} "$file" --repo ${{ github.repository }} || true
          done
